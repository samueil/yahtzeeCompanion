name: 'CodeQL Android'

on:
  push:
    branches: ['main']
    paths:
      - 'android/**'
      - 'package*.json'
  schedule:
    - cron: '30 5 1 * *' # Runs at 05:30 on the 1st of every month

jobs:
  analyze-android:
    name: Analyze Java/Kotlin
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      # We still need Node & npm ci because React Native's Android
      # Gradle scripts read from node_modules!
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Android
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java-kotlin'
