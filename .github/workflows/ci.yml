name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  verify-and-test:
    name: Verify, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test
