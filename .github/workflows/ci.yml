name: CI Pipeline
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify-and-test:
    name: Verify, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Inject Firebase Config (Android)
        if: success()
        env:
          JSON_DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$JSON_DATA" > google-services.json

      - name: Inject Firebase Config (iOS)
        if: success()
        env:
          XML_DATA: ${{ secrets.GOOGLE_SERVICE_XML }}
        run: echo "$XML_DATA" > GoogleService-Info.plist

      - name: Check App Bundle
        run: npm run build:check
