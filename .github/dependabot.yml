# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain dependencies for the React Native app (npm/yarn)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    ignore:
      # Ignore core React/Expo dependencies.
      # These should only be updated via `npx expo upgrade` to ensure SDK compatibility.
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-native'
      - dependency-name: 'react-test-renderer'
      - dependency-name: 'expo*'
      # Ignore all major version updates for npm packages
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    # Grouping related updates to reduce PR noise
    groups:
      react-dependencies:
        patterns:
          - 'react*'
          - '@types/react*'

  # Maintain dependencies for the Android project (Gradle)
  - package-ecosystem: 'gradle'
    directory: '/android'
    schedule:
      interval: 'weekly'
    ignore:
      - dependency-name: 'gradle-wrapper'

  # Maintain GitHub Actions versions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
